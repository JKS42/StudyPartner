# StudyPartner Supabase local config
# See: https://supabase.com/docs/guides/cli/config

project_id = "studypartner"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "studypartner://"
additional_redirect_urls = ["studypartner://auth/callback", "exp://127.0.0.1:8081"]

[storage]
enabled = true
file_size_limit = "15MiB"

# Push notifications (no AI edge functions)
[functions.send-push]
verify_jwt = true

# Cron job uses CRON_SECRET, not a user JWT
[functions.send-study-reminders]
verify_jwt = false
